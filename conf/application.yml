#
# Batata Configuration
#
# Batata is a Rust implementation compatible with Nacos 3.x.
# All config keys use the `batata.*` prefix. Override any key via:
#   - BATATA_* environment variables (e.g., BATATA_SERVER_MAIN_PORT=9090)
#   - CLI property overrides (e.g., --batata.server.main.port=9090)
#

# =============================================================================
# Server
# =============================================================================

# Main HTTP server port (SDK clients connect here)
batata.server.main.port: 8848

# Server web context path (used for HTTP API prefix, e.g., /nacos/v2/cs/*)
batata.server.context_path: /nacos

# Standalone mode: true = single node, false = cluster mode
batata.standalone: true

# Deployment type: merged | server | console | serverWithMcp
# - merged (default): Main Server (8848) + Console (8081) in same process
# - server:           Main Server only (no console)
# - console:          Console only (connects to remote server)
# - serverWithMcp:    Main Server + MCP Registry (9080)
#batata.deployment.type: merged

# =============================================================================
# Console
# =============================================================================

# Console HTTP server port
batata.console.port: 8081

# Console web context path (empty = root)
batata.console.context_path:

# Enable/disable console UI
#batata.console.ui.enabled: true

# --- Console Remote Mode (used when deployment type is `console`) ---

# Remote server address (fallback if batata.member.list and cluster.conf are not configured)
#batata.console.remote.server_addr: http://127.0.0.1:8848

# Remote data auto-refresh settings
#batata.console.remote.refresh_interval_secs: 30     # polling interval for cluster info
#batata.console.remote.initial_delay_secs: 5         # initial delay before first refresh

# Remote server credentials (used as fallback when server identity is not configured)
#batata.console.remote.username: nacos
#batata.console.remote.password: nacos

# =============================================================================
# Database
# =============================================================================

# Storage mode is auto-derived:
#   platform = "mysql"/"postgresql"       → External DB (requires batata.db.url)
#   platform = empty + standalone=true    → Embedded RocksDB (single node)
#   platform = empty + standalone=false   → Distributed Raft + RocksDB (cluster)
batata.sql.init.platform: mysql

# Database connection URL
# For MySQL:      mysql://user:password@localhost:3306/batata
# For PostgreSQL: postgres://user:password@localhost:5432/batata
# Also configurable via DATABASE_URL env var or --db-url CLI arg
batata.db.url:

# Connection pool settings
batata.db.pool.max_connections: 100
batata.db.pool.min_connections: 10
batata.db.pool.connect_timeout: 30
batata.db.pool.acquire_timeout: 30
batata.db.pool.idle_timeout: 600
batata.db.pool.max_lifetime: 1800
batata.db.pool.sqlx_logging: false

# Auto-run database migrations on startup (only for external DB mode)
batata.db.migration.enabled: false

# RocksDB data directory (for embedded modes only)
#batata.persistence.embedded.data_dir: data/rocksdb

# =============================================================================
# Authentication
# =============================================================================

# Auth system type: nacos (default), ldap, or oauth
batata.core.auth.system.type: nacos

# Enable auth for each API surface
batata.core.auth.enabled: true
batata.core.auth.admin.enabled: true
batata.core.auth.console.enabled: true

# Server identity for trusted server-to-server communication
# Used by InnerApi auth bypass and Console remote mode
batata.core.auth.server.identity.key: nacos-server-key
batata.core.auth.server.identity.value: nacos-server-value

# JWT token configuration
batata.core.auth.plugin.nacos.token.expire.seconds: 18000
# Secret key (Base64-encoded). Generate with: openssl rand -base64 32
batata.core.auth.plugin.nacos.token.secret.key: NzViOWFlNjYtMWM3MC00ZDYwLTg4OWUtMjYxYTdhMzA1Y2Jm

# --- LDAP Configuration (when batata.core.auth.system.type=ldap) ---
#batata.core.auth.ldap.url: ldap://localhost:389
#batata.core.auth.ldap.base_dc: dc=example,dc=org
#batata.core.auth.ldap.bind_dn: cn=admin,${batata.core.auth.ldap.base_dc}
#batata.core.auth.ldap.password: admin
#batata.core.auth.ldap.user_dn_pattern: cn={0},dc=example,dc=org
#batata.core.auth.ldap.filter.prefix: uid
#batata.core.auth.ldap.case.sensitive: true
#batata.core.auth.ldap.ignore.partial.result.exception: false

# --- OAuth2/OIDC Configuration ---
#batata.core.auth.oauth.enabled: false
#batata.core.auth.oauth.user.creation: auto
#batata.core.auth.oauth.role.sync: on_login

# =============================================================================
# Rate Limiting
# =============================================================================

# API rate limiting
batata.ratelimit.enabled: false
batata.ratelimit.max_requests: 10000
batata.ratelimit.window_seconds: 60

# Authentication rate limiting (brute force protection)
batata.ratelimit.auth.enabled: false
batata.ratelimit.auth.max_attempts: 5
batata.ratelimit.auth.window_seconds: 60
batata.ratelimit.auth.lockout_seconds: 300

# =============================================================================
# Control Plugin (TPS Rate Limiting & Connection Control)
# =============================================================================

# Enable TPS rate limiting and connection control
batata.plugin.control.enabled: false
# Default TPS limit per control point when no specific rule matches
batata.plugin.control.default_tps: 10000
# Maximum concurrent gRPC connections
batata.plugin.control.max_connections: 50000

# =============================================================================
# Config Module
# =============================================================================

# Config retention days
#batata.config.retention.days: 30

# --- Config Gray Version Management ---
# Maximum number of gray (beta/tag) versions per config entry (default: 10)
# Matches Nacos nacos.config.gray.version.max.count property.
#batata.config.gray.version.max_count: 10

# --- Config Encryption ---
batata.config.encryption.enabled: false
batata.config.encryption.plugin.type: aes-gcm
# Encryption key (32-byte Base64-encoded). Generate with: openssl rand -base64 32
#batata.config.encryption.key: YOUR_BASE64_ENCODED_32_BYTE_KEY
# Hot reload interval in ms (0 = disabled)
batata.config.encryption.reload.interval.ms: 0

# =============================================================================
# Naming Module
# =============================================================================

# Enable instance auto-expiration (health check based)
#batata.naming.expire_instance: true

# Enable data warmup (server waits for data sync before accepting requests)
#batata.naming.data.warmup: false

# --- Naming Health Check Intervals ---
#batata.naming.healthcheck.heartbeat_interval_secs: 5         # heartbeat check interval
#batata.naming.healthcheck.ttl_monitor_interval_secs: 5       # TTL monitor scan interval
#batata.naming.healthcheck.deregister_monitor_interval_secs: 10  # deregister monitor interval

# =============================================================================
# Cluster
# =============================================================================

# Member list for cluster mode (alternative to conf/cluster.conf)
# Format: comma-separated ip:port or ip:port?raft_port=xxx
#batata.member.list: "192.168.1.10:8848,192.168.1.11:8848,192.168.1.12:8848"

# Member lookup type: file (default) or address-server
#batata.core.member.lookup.type: file

# =============================================================================
# Cluster Internal (circuit breaker, distro, health check)
# =============================================================================

# --- Circuit Breaker (protects remote calls from cascading failures) ---
#batata.cluster.circuit_breaker.failure_threshold: 5       # failures before opening circuit
#batata.cluster.circuit_breaker.reset_timeout_ms: 30000    # time before half-open (30s)
#batata.cluster.circuit_breaker.success_threshold: 3       # successes to close from half-open
#batata.cluster.circuit_breaker.failure_window_ms: 60000   # failure counting window (60s)

# --- Distro Protocol (ephemeral data sync across cluster nodes) ---
#batata.cluster.distro.sync_delay_ms: 1000         # delay before syncing after change
#batata.cluster.distro.sync_timeout_ms: 3000       # timeout for sync operations
#batata.cluster.distro.sync_retry_delay_ms: 3000   # retry delay after sync failure
#batata.cluster.distro.verify_interval_ms: 5000    # data verification interval
#batata.cluster.distro.verify_timeout_ms: 3000     # timeout for verify operations
#batata.cluster.distro.load_retry_delay_ms: 30000  # retry delay for snapshot loading
#batata.cluster.distro.load_max_retries: 5         # max retry attempts for initial data load
# Require successful initial data load before serving queries (default: false)
# false = Nacos-compatible: start immediately, verify cycle fills data within seconds
# true  = strict: node stays NOT_READY until initial sync from peers completes
#batata.cluster.distro.require_initial_load: false

# --- Cluster Health Check (monitors cluster member health) ---
#batata.cluster.health_check.interval_ms: 5000     # interval between health checks
#batata.cluster.health_check.timeout_ms: 3000      # timeout for health check requests
#batata.cluster.health_check.max_fail_count: 3     # failures before marking node DOWN
#batata.cluster.health_check.suspicious_threshold: 1  # failures before SUSPICIOUS
#batata.cluster.event_queue_size: 1024              # cluster event queue capacity

# --- Member Info Report (periodic metadata exchange between cluster nodes) ---
# Interval for reporting local member info to peers, round-robin (default: 5000ms)
# Similar to Nacos MemberInfoReportTask. Set to 0 to disable.
#batata.cluster.member_report.interval_ms: 5000

# =============================================================================
# Raft Consensus (distributed embedded mode only)
# =============================================================================

# Election timeout (ms). Follower starts election if no heartbeat within this period.
# Increase for WAN clusters or high-latency networks. Must be > 3 * heartbeat_interval.
#batata.raft.election_timeout_ms: 5000

# Heartbeat interval (ms). Leader sends heartbeats at this rate.
#batata.raft.heartbeat_interval_ms: 1000

# RPC request timeout (ms) for individual Raft RPCs (AppendEntries, Vote).
#batata.raft.rpc_timeout_ms: 5000

# Snapshot threshold — number of log entries before triggering a snapshot.
#batata.raft.snapshot_threshold: 10000

# Snapshot transfer timeout (ms). Should be larger than rpc_timeout for large snapshots.
#batata.raft.snapshot_transfer_timeout_ms: 30000

# --- Raft Leader Forwarding (follower → leader write forwarding) ---
# Max retries when forwarding writes to leader. Uses exponential backoff with jitter.
#batata.raft.forward.max_retries: 3
# Initial retry delay in ms. Doubles each attempt: 200, 400, 800ms.
#batata.raft.forward.initial_delay_ms: 200

# --- Raft Peer Discovery (cluster initialization) ---
# Timeout (seconds) for waiting for peer Raft gRPC servers to become reachable
# during cluster initialization. Applies to both Nacos Raft and Consul Raft groups.
#batata.raft.peer_connect_timeout_secs: 30
# Retry interval (ms) when probing peer Raft server readiness.
#batata.raft.peer_connect_retry_interval_ms: 500

# =============================================================================
# gRPC
# =============================================================================

# --- SDK gRPC Server (client connections, port = main port + 1000) ---
#batata.remote.server.grpc.sdk.max_inbound_message_size: 10485760
#batata.remote.server.grpc.sdk.keep_alive_time: 7200000
#batata.remote.server.grpc.sdk.keep_alive_timeout: 20000

# --- Cluster gRPC Server (inter-node, port = main port + 1001) ---
#batata.remote.server.grpc.cluster.connect_timeout: 5000
#batata.remote.server.grpc.cluster.request_timeout: 5000
#batata.remote.server.grpc.cluster.max_retries: 3
#batata.remote.server.grpc.cluster.retry_delay: 500
#batata.remote.server.grpc.cluster.idle_timeout: 300000

# --- gRPC Server TLS ---
#batata.remote.server.grpc.sdk.tls.enabled: false
#batata.remote.server.grpc.cluster.tls.enabled: false
#batata.remote.server.grpc.tls.cert.path: /path/to/server.crt
#batata.remote.server.grpc.tls.key.path: /path/to/server.key
#batata.remote.server.grpc.tls.mtls.enabled: false
#batata.remote.server.grpc.tls.ca.cert.path: /path/to/ca.crt

# --- gRPC Client TLS (Cluster inter-node) ---
#batata.remote.client.grpc.cluster.tls.enabled: false
#batata.remote.client.grpc.cluster.tls.cert.path: /path/to/client.crt
#batata.remote.client.grpc.cluster.tls.key.path: /path/to/client.key
#batata.remote.client.grpc.cluster.tls.ca.cert.path: /path/to/ca.crt
#batata.remote.client.grpc.cluster.tls.domain: cluster.local

# =============================================================================
# Logging
# =============================================================================

# Log directory path
batata.logs.path: logs

# Console output (stdout)
batata.logs.console.enabled: true

# File logging (creates per-module log files: batata.log, naming-server.log, etc.)
batata.logs.file.enabled: true

# Log level: trace, debug, info, warn, error
batata.logs.level: info

# Environment variables:
#   BATATA_LOG_DIR, BATATA_LOG_CONSOLE, BATATA_LOG_FILE, BATATA_LOG_LEVEL
#   RUST_LOG: Fine-grained per-module control (e.g., batata_config=debug,info)

# =============================================================================
# OpenTelemetry (Distributed Tracing)
# =============================================================================

batata.otel.enabled: false
#batata.otel.endpoint: http://localhost:4317
batata.otel.service_name: batata
batata.otel.sampling_ratio: 0.1
batata.otel.export_timeout_secs: 10

# =============================================================================
# Consul Compatibility Plugin
# =============================================================================

# --- Webhook Plugin ---
#batata.plugin.webhook.default_timeout_secs: 30      # default HTTP client timeout for webhooks

batata.plugin.consul.enabled: false
batata.plugin.consul.port: 8500
#batata.plugin.consul.raft.port: 7500
batata.plugin.consul.version: 1.22.5
batata.plugin.consul.datacenter: dc1
#batata.plugin.consul.primary_datacenter: dc1
batata.plugin.consul.data_dir: data/consul_rocksdb
batata.plugin.consul.register_self: true
batata.plugin.consul.acl.enabled: false
batata.plugin.consul.check_reap_interval: 30
batata.plugin.consul.default_namespace: consul
batata.plugin.consul.default_group: CONSUL_GROUP
batata.plugin.consul.default_cluster: DEFAULT

# Consul client HTTP timeouts
#batata.plugin.consul.client.connect_timeout_secs: 5
#batata.plugin.consul.client.read_timeout_secs: 30

# =============================================================================
# MCP Registry
# =============================================================================

# Official MCP Registry OpenAPI server (automatically enabled with serverWithMcp deployment)
batata.ai.mcp.registry.enabled: false
batata.ai.mcp.registry.port: 9080

# =============================================================================
# Service Mesh (xDS)
# =============================================================================

batata.mesh.xds.enabled: false
batata.mesh.xds.port: 15010
batata.mesh.xds.server.id: batata-xds-server
batata.mesh.xds.sync.interval.ms: 5000
batata.mesh.xds.generate.listeners: true
batata.mesh.xds.generate.routes: true
batata.mesh.xds.default.listener.port: 15001
#batata.mesh.xds.tls.enabled: false
#batata.mesh.xds.tls.cert.path: /path/to/xds-server.crt
#batata.mesh.xds.tls.key.path: /path/to/xds-server.key

# =============================================================================
# Performance Tuning
# =============================================================================

# All values below are defaults. Uncomment and adjust to override.

# --- HTTP Server ---
#batata.server.http.workers: 0            # 0 = auto-detect CPU cores
#batata.server.http.keep_alive: 75        # seconds (main server)
#batata.console.http.keep_alive: 30       # seconds (console server)
#batata.server.http.max_payload_size: 10485760   # 10MB max request payload
#batata.server.http.max_json_size: 5242880       # 5MB max JSON body
#batata.server.http.client_request_timeout: 60   # seconds

# --- HTTP Response Compression ---
# Compress responses (gzip, deflate, br) to reduce bandwidth usage.
# Particularly effective for large config payloads and service lists.
#batata.server.http.compression.enabled: true
#batata.server.http.compression.min_size: 256    # bytes; responses smaller than this are not compressed

# HTTP access log (per-request logging). Disable for better performance.
#batata.server.http.access_log.enabled: true

# --- gRPC Server ---
#batata.server.grpc.tcp_keepalive: 30              # seconds
#batata.server.grpc.tcp_nodelay: true              # disable Nagle's algorithm for lower latency
#batata.server.grpc.http2_keepalive_interval: 30   # seconds
#batata.server.grpc.http2_keepalive_timeout: 10    # seconds
#batata.server.grpc.concurrency_limit: 256
#batata.server.grpc.connection_stale_ms: 60000     # milliseconds
#batata.server.grpc.initial_connection_window_size: 1048576  # 1MB HTTP/2 connection-level flow control
#batata.server.grpc.initial_stream_window_size: 524288       # 512KB HTTP/2 stream-level flow control
#batata.server.grpc.max_frame_size: 16384                    # bytes; HTTP/2 max frame size

# Push message timeout: max time to wait when pushing a message to a client.
# Prevents indefinite blocking when a client's channel buffer is full.
#batata.server.grpc.push_message_timeout: 5000               # milliseconds

# Bi-directional streaming channel buffer capacity.
# Higher values reduce backpressure but increase memory per connection.
#batata.server.grpc.bistream_channel_capacity: 128

# Subscriber notification timeout. 0 = fire-and-forget (non-blocking, default).
# Non-zero = total timeout for pushing notifications to all subscribers.
#batata.server.grpc.notify_subscriber_timeout: 0             # milliseconds

# --- Raft gRPC ---
# Keep-alive and connection tuning for Raft inter-node communication.
# Shorter intervals than SDK/cluster gRPC because Raft is latency-sensitive.
#batata.raft.grpc.tcp_keepalive: 10                          # seconds
#batata.raft.grpc.tcp_nodelay: true
#batata.raft.grpc.http2_keepalive_interval: 10               # seconds
#batata.raft.grpc.http2_keepalive_timeout: 5                 # seconds

# --- RocksDB ---
# These settings apply to all RocksDB instances (state machine, log store, Consul).
#batata.rocksdb.write_buffer_mb: 128
#batata.rocksdb.max_write_buffers: 4
#batata.rocksdb.max_background_jobs: 4
#batata.rocksdb.block_cache_mb: 256
#batata.rocksdb.bloom_filter_bits: 10            # bits per key for bloom filter (0 = disabled)
#batata.rocksdb.enable_statistics: false          # enable RocksDB internal statistics
#batata.rocksdb.level_compaction_dynamic: true    # dynamic level sizes for better space amplification
#batata.rocksdb.bottommost_compression: zstd      # zstd for bottommost level (better ratio), lz4 for speed
#batata.rocksdb.compression: lz4                  # default compression for non-bottommost levels
#batata.rocksdb.whole_key_filtering: true          # whole-key bloom filtering for point lookups
#batata.rocksdb.data_block_hash_ratio: 0.75        # hash index ratio in data blocks (0.0 = disabled)

# --- Rate Limiting ---
# Maximum tracked IPs to prevent unbounded memory growth under DoS
#batata.ratelimit.max_tracked_ips: 100000
# Cleanup interval in seconds for expired rate limiter entries
#batata.ratelimit.cleanup_interval_secs: 300

# --- Auth Caches ---
#batata.core.auth.cache.token_capacity: 50000
#batata.core.auth.cache.token_ttl_secs: 300          # token cache TTL (5 minutes)
#batata.core.auth.cache.roles_capacity: 50000
#batata.core.auth.cache.permissions_capacity: 20000
#batata.core.auth.cache.blacklist_capacity: 100000    # token blacklist capacity
#batata.core.auth.cache.blacklist_ttl_secs: 86400     # token blacklist TTL (24 hours)
#batata.core.auth.cache.grpc_permission_capacity: 10000  # gRPC permission check cache
#batata.core.auth.cache.grpc_permission_ttl_secs: 300    # gRPC permission cache TTL (5 minutes)

# --- OAuth Cache ---
#batata.core.auth.oauth.cache.discovery_ttl_secs: 3600     # OIDC discovery cache (1 hour)
#batata.core.auth.oauth.cache.discovery_capacity: 100
#batata.core.auth.oauth.cache.state_ttl_secs: 600          # OAuth state cache (10 minutes)
#batata.core.auth.oauth.cache.state_capacity: 10000
#batata.core.auth.oauth.http_timeout_secs: 30               # OAuth HTTP client timeout

# =============================================================================
# Version Information
# =============================================================================

# Nacos compatibility version (the Nacos version that Batata is compatible with)
nacos.version: 3.2.0
