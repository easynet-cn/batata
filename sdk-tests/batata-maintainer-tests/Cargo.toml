[workspace]

[package]
name = "batata-maintainer-tests"
version = "0.1.0"
edition = "2021"
publish = false

[[test]]
name = "core_admin_test"
path = "tests/core_admin_test.rs"

[[test]]
name = "config_admin_test"
path = "tests/config_admin_test.rs"

[[test]]
name = "naming_admin_test"
path = "tests/naming_admin_test.rs"

[[test]]
name = "client_introspection_test"
path = "tests/client_introspection_test.rs"

[[test]]
name = "auth_rbac_test"
path = "tests/auth_rbac_test.rs"

[[test]]
name = "config_extended_test"
path = "tests/config_extended_test.rs"

[[test]]
name = "cluster_extended_test"
path = "tests/cluster_extended_test.rs"

[[test]]
name = "plugin_model_test"
path = "tests/plugin_model_test.rs"

[[test]]
name = "traits_test"
path = "tests/traits_test.rs"

[[test]]
name = "core_extended_test"
path = "tests/core_extended_test.rs"

[[test]]
name = "naming_extended_test"
path = "tests/naming_extended_test.rs"

[dev-dependencies]
batata-client = { path = "../../crates/batata-client" }
batata-maintainer-client = { path = "../../crates/batata-maintainer-client" }
batata-api = { path = "../../crates/batata-api" }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
uuid = { version = "1", features = ["v4"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
