# Batata Development & Testing Docker Compose
#
# Usage:
#   Embedded mode (no DB):  docker compose up batata
#   With MySQL:             docker compose --profile mysql up
#   With PostgreSQL:        docker compose --profile postgres up
#   Full stack:             docker compose --profile mysql --profile monitoring up

version: "3.8"

services:
  # ============================================================================
  # Batata Server (embedded RocksDB, no external DB)
  # ============================================================================
  batata:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: batata
    ports:
      - "8848:8848"   # Main HTTP API
      - "8081:8081"   # Console HTTP API
      - "9848:9848"   # SDK gRPC
      - "9849:9849"   # Cluster gRPC
      - "8500:8500"   # Consul compatibility
      - "9080:9080"   # MCP Registry
    environment:
      - BATATA_SERVER_IP=0.0.0.0
      - BATATA_LOG_LEVEL=info
    volumes:
      - batata-data:/app/data
      - ./conf:/app/conf:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/v3/console/health/liveness"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ============================================================================
  # Batata Server with MySQL
  # ============================================================================
  batata-mysql:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: batata-mysql
    profiles: [mysql]
    ports:
      - "8848:8848"
      - "8081:8081"
      - "9848:9848"
      - "8500:8500"
    environment:
      - BATATA_SERVER_IP=0.0.0.0
      - BATATA_LOG_LEVEL=info
    command:
      - "--db.url=mysql://batata:batata@mysql:3306/batata"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./conf:/app/conf:ro

  mysql:
    image: mysql:8.0
    container_name: batata-mysql-db
    profiles: [mysql]
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: batata
      MYSQL_USER: batata
      MYSQL_PASSWORD: batata
    volumes:
      - mysql-data:/var/lib/mysql
      - ./conf/mysql-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================================================
  # Batata Server with PostgreSQL
  # ============================================================================
  batata-postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: batata-postgres
    profiles: [postgres]
    ports:
      - "8848:8848"
      - "8081:8081"
      - "9848:9848"
      - "8500:8500"
    environment:
      - BATATA_SERVER_IP=0.0.0.0
      - BATATA_LOG_LEVEL=info
    command:
      - "--db.url=postgres://batata:batata@postgres:5432/batata"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./conf:/app/conf:ro

  postgres:
    image: postgres:16
    container_name: batata-postgres-db
    profiles: [postgres]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: batata
      POSTGRES_USER: batata
      POSTGRES_PASSWORD: batata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./conf/postgresql-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batata -d batata"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================================================
  # Monitoring Stack (optional)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: batata-prometheus
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - batata

  grafana:
    image: grafana/grafana:latest
    container_name: batata-grafana
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

volumes:
  batata-data:
  mysql-data:
  postgres-data:
